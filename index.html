<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Trust Seed — Enterprise Financial Platform</title>
    <meta
      name="description"
      content="Trust Seed is a multi-tenant enterprise financial platform for institutions — loans, savings, transactions, forex, and accounting unified in one secure system."
    />
    <meta name="author" content="Trust Seed" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="Trust Seed" />

    <!-- Theme color (adapts to OS light/dark) -->
    <meta name="theme-color" content="#1e40af" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trust Seed" />

    <!-- Canonical (update to your production domain when you deploy) -->
    <link rel="canonical" href="https://trustseed.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Trust Seed" />
    <meta property="og:url" content="https://trustseed.app/" />
    <meta property="og:title" content="Trust Seed — Enterprise Financial Platform" />
    <meta
      property="og:description"
      content="Multi-tenant financial platform for institutions — loans, savings, transactions, forex, and accounting in one secure system."
    />
    <meta property="og:image" content="https://trustseed.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trust Seed — Enterprise Financial Platform" />
    <meta
      name="twitter:description"
      content="Multi-tenant financial platform for institutions — loans, savings, transactions, forex, and accounting."
    />
    <meta name="twitter:image" content="https://trustseed.app/og-image.png" />

    <!-- Performance: warm up the connection to Supabase before the first request -->
    <link rel="preconnect" href="https://elfwatnperzsfosqcmpj.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://elfwatnperzsfosqcmpj.supabase.co" />

    <!-- Preload the logo so the splash shows it instantly -->
    <link rel="preload" as="image" href="/logo.png" />

    <!-- Critical inline CSS for the pre-mount splash (no FOUC / white flash) -->
    <style>
      :root {
        --ts-bg: #f4f7fb;
        --ts-bg-2: #e6edf7;
        --ts-fg: #0f172a;
        --ts-muted: #64748b;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ts-bg: #0b1220;
          --ts-bg-2: #0e1a30;
          --ts-fg: #e6edf7;
          --ts-muted: #93a3bd;
        }
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--ts-bg);
        color: var(--ts-fg);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      #root { min-height: 100%; }

      /* ===== Single loading splash: real logo only ===== */
      .ts-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(180deg, var(--ts-bg) 0%, var(--ts-bg-2) 100%);
        animation: ts-fade-in 0.35s ease both;
      }

      .ts-logo {
        width: clamp(96px, 28vw, 150px);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.12));
        animation: ts-pulse 1.8s ease-in-out infinite;
      }

      .ts-hint {
        font-size: 12.5px;
        letter-spacing: 0.02em;
        color: var(--ts-muted);
      }

      @keyframes ts-fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes ts-pulse {
        0%, 100% { opacity: 0.65; transform: scale(0.98); }
        50%      { opacity: 1;    transform: scale(1.02); }
      }

      @media (prefers-reduced-motion: reduce) {
        .ts-splash { animation: none; }
        .ts-logo { animation: ts-pulse 3s ease-in-out infinite; }
      }

      /* No-JS fallback */
      .ts-noscript {
        max-width: 460px;
        margin: 12vh auto;
        padding: 28px;
        text-align: center;
        line-height: 1.6;
      }
      .ts-noscript h1 { font-size: 18px; margin: 0 0 8px; }
      .ts-noscript p { color: var(--ts-muted); margin: 0; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-mount splash. React's render() replaces this entire subtree on mount. -->
      <div class="ts-splash" role="status" aria-live="polite" aria-label="Loading Trust Seed">
        <img class="ts-logo" src="/logo.png" alt="Trust Seed" width="150" height="150" />
        <div class="ts-hint">Loading…</div>
      </div>
    </div>


    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
